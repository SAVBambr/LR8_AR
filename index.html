<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>3D модель LR8 с насыщенностью цвета</title>

  <!-- Экспериментальная сборка model-viewer с поддержкой postprocessing -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js?module&experimental=true"></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/postprocessing.min.js"></script>

  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 600px;
      height: 500px;
      position: relative;
    }

    button[slot="ar-button"] {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5em 1em;
      font-size: 16px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<model-viewer
  id="effectsViewer"
  src="LR8_1.glb"
  ios-src="LR8_1.usdz"
  camera-controls
  autoplay
  animation-name="Приветствие"
  ar
  ar-modes="webxr scene-viewer quick-look"
  alt="3D модель LR8"
  enable-webxr-effects>

  <button slot="ar-button">Посмотреть в AR</button>

  <!-- Эффект пост-обработки: насыщенность цвета -->
  <effect-composer render-mode="quality">
    <color-grade-effect blend-mode="default" saturation="1.7"></color-grade-effect>
  </effect-composer>

</model-viewer>

<script type="module">
  const model = document.querySelector("#effectsViewer");

  // Автозапуск анимации с плавным переходом
  model.addEventListener("load", () => {
    setTimeout(() => {
      model.animationName = "Танец";
      model.play({
        repetitions: Infinity,
        crossfadeDuration: 1000
      });
    }, 3000);
  });
</script>

</body>
</html>
