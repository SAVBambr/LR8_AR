<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>3D модель LR8 с насыщенностью цвета</title>

  <!-- Экспериментальная сборка model-viewer с поддержкой postprocessing -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js?module&experimental=true"></script>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/postprocessing.min.js"></script>

  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #ffffff;
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 600px;
      height: 500px;
      position: relative;
    }

    button[slot="ar-button"] {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5em 1em;
      font-size: 16px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .controls {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.9);
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
    }

    .controls div {
      margin-bottom: 4px;
    }

    input[type="range"] {
      width: 100%;
    }
  </style>
</head>
<body>

<model-viewer
  id="effectsViewer"
  src="LR8_1.glb"
  ios-src="LR8_1.usdz"
  camera-controls
  autoplay
  animation-name="Приветствие"
  ar
  ar-modes="webxr scene-viewer quick-look"
  alt="3D модель LR8"
  enable-webxr-effects>

  <button slot="ar-button">Посмотреть в AR</button>

  <!-- Эффект пост-обработки: насыщенность цвета -->
  <effect-composer render-mode="quality">
    <color-grade-effect id="colorEffect" blend-mode="default" saturation="1"></color-grade-effect>
  </effect-composer>

  <!-- Панель управления насыщенностью -->
  <div class="controls">
    <div>
      <label for="saturation">Насыщенность цвета</label>
      <input type="range" id="saturation" min="0" max="2" step="0.01" value="1">
    </div>
  </div>

</model-viewer>

<script type="module">
  const model = document.querySelector("#effectsViewer");
  const colorEffect = model.querySelector("#colorEffect");
  const saturationInput = document.querySelector("#saturation");

  // Меняем насыщенность цвета через ползунок
  saturationInput.addEventListener("input", (e) => {
    colorEffect.saturation = parseFloat(e.target.value);
  });

  // Автозапуск анимации с плавным переходом
  model.addEventListener("load", () => {
    setTimeout(() => {
      model.animationName = "Танец";
      model.play({
        repetitions: Infinity,
        crossfadeDuration: 1000
      });
    }, 3000);
  });
</script>

</body>
</html>
