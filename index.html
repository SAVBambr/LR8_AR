<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Анимация 3D модели LR8</title>

  <!-- Подключаем model-viewer и postprocessing -->
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <script type="module">
    import '@google/model-viewer/dist/postprocessing.min.js';
  </script>

  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #ffffff; /* белый фон */
      font-family: Arial, sans-serif;
    }

    model-viewer {
      width: 600px;
      height: 500px;
    }

    /* Стили кнопки AR */
    button[slot="ar-button"] {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 0.5em 1em;
      font-size: 16px;
      background-color: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Панель управления эффектами */
    .controls {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.9);
      padding: 10px;
      border-radius: 6px;
      font-size: 14px;
    }
    .controls div {
      margin-bottom: 4px;
    }
  </style>
</head>
<body>

<model-viewer
  id="effectsViewer"
  src="LR8_1.glb"
  ios-src="LR8_1.usdz"
  camera-controls
  autoplay
  animation-name="Приветствие"
  ar
  ar-modes="webxr scene-viewer quick-look"
  alt="3D модель LR8">

  <!-- Кнопка AR -->
  <button slot="ar-button">Посмотреть в AR</button>

  <!-- Эффекты пост-обработки -->
  <effect-composer render-mode="quality">
    <outline-effect color="blue" blend-mode="skip"></outline-effect>
    <ssao-effect blend-mode="skip"></ssao-effect>
    <glitch-effect blend-mode="skip"></glitch-effect>
    <smaa-effect blend-mode="skip"></smaa-effect>
    <bloom-effect blend-mode="skip"></bloom-effect>
    <pixelate-effect granularity="5" blend-mode="skip"></pixelate-effect>
    <color-grade-effect blend-mode="default"></color-grade-effect>
  </effect-composer>

  <!-- Панель управления эффектами -->
  <div class="controls glass">
    <div><input type="checkbox" id="outline"><label for="outline">Outline Effect</label></div>
    <div><input type="checkbox" id="ssao"><label for="ssao">SSAO Effect</label></div>
    <div><input type="checkbox" id="glitch"><label for="glitch">Glitch Effect</label></div>
    <div><input type="checkbox" id="smaa"><label for="smaa">SMAA Effect</label></div>
    <div><input type="checkbox" id="bloom"><label for="bloom">Bloom Effect</label></div>
    <div><input type="checkbox" id="pixelate"><label for="pixelate">Pixelate Effect</label></div>
    <div><input type="checkbox" id="colorgrade" checked><label for="colorgrade">Color Grade Effect</label></div>
  </div>
</model-viewer>

<script type="module">
  const model = document.querySelector("#effectsViewer");
  const effects = model.querySelector("effect-composer").children;
  const inputs = model.querySelectorAll(".controls input");

  // Привязка чекбоксов к эффектам
  for (let i = 0; i < effects.length; i++) {
    inputs[i].addEventListener('change', (e) => {
      effects[i].blendMode = e.target.checked ? 'default' : 'skip';
    });
  }

  // Автозапуск анимации и плавный переход на "Танец"
  model.addEventListener("load", () => {
    setTimeout(() => {
      model.animationName = "Танец";
      model.play({
        repetitions: Infinity,
        crossfadeDuration: 1000
      });
    }, 3000);
  });
</script>

</body>
</html>
